<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NaturaVida 🌿</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <h1>NaturaVida 🌿</h1>
  <p>Salud natural a tu alcance</p>
</header>

<div class="top-bar">
  <input type="text" id="buscador" placeholder="Buscar producto...">

  <div class="filtros">
    <button onclick="filtrar('todos')">Todos</button>
    <button onclick="filtrar('tes')">Tés</button>
    <button onclick="filtrar('proteina')">Proteínas</button>
  </div>
</div>

<section class="productos">

  <div class="card tes">
    <img src="img/te.jpg">
    <h2>Té Verde</h2>
    <p>Ayuda a la digestión</p>
    <span>$15000</span>
    <button onclick="agregarCarrito('Té Verde',15000)">Agregar</button>
  </div>

  <div class="card proteina">
    <img src="img/proteina.jpg">
    <h2>Proteína Natural</h2>
    <p>Energía y masa muscular</p>
    <span>$80000</span>
    <button onclick="agregarCarrito('Proteína Natural',80000)">Agregar</button>
  </div>

</section>

<!-- BOTÓN CARRITO -->
<div class="btn-carrito" onclick="toggleCarrito()">
  🛒 <span id="contador">0</span>
</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="toggleCarrito()"></div>

<!-- CARRITO -->
<div class="carrito-panel" id="carritoPanel">
  <button class="cerrar" onclick="toggleCarrito()">✖</button>

  <h2>Carrito</h2>
  <ul id="lista-carrito"></ul>
  <p id="total">Total: $0</p>

  <select id="metodoPago">
    <option value="">Método de pago</option>
    <option value="Nequi">Nequi</option>
    <option value="Daviplata">Daviplata</option>
    <option value="Tarjeta">Tarjeta</option>
  </select>

  <button onclick="enviarWhatsApp()">Comprar</button>
</div>

<div id="notificacion" class="notificacion"></div>

<script src="script.js"></script>

</body>
</html>
