<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Herbanza 🌿</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <h1>Herbanza 🌿</h1>
  <p>Bienestar natural premium</p>
</header>

<div class="top-bar">
  <input type="text" id="buscador" placeholder="Buscar productos...">

  <div class="filtros">
    <button onclick="filtrar('todos')" class="activo">Todos</button>
    <button onclick="filtrar('te')">Tés</button>
    <button onclick="filtrar('proteina')">Proteínas</button>
  </div>
<div class="carrito">
  <h2>🛒 Carrito</h2>
  <ul id="lista-carrito"></ul>
  <p id="total">Total: $0</p>
  <button onclick="enviarWhatsApp()">Pedir por WhatsApp</button>
</div>

</div>

<section class="productos">

  <div class="card te">
    <span class="badge">Natural</span>
    <img src="img/te.jpg">
    <h2>Té Verde Premium</h2>
    <p>Mejora la digestión y acelera el metabolismo</p>
    <span class="precio">$15.000</span>
    <button onclick="agregarCarrito('Té Verde', 15000)">Agregar</button>
  </div>

  <div class="card proteina">
    <span class="badge top">Top</span>
    <img src="img/proteina.jpg">
    <h2>Proteína Natural Pro</h2>
    <p>Energía limpia y desarrollo muscular</p>
    <span class="precio">$80.000</span>
    <button onclick="agregarCarrito('Proteína Natural', 80000)">Agregar</button>
  </div>

</section>

<script src="script.js"></script>

</body>
</html>
