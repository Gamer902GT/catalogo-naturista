<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tienda Naturista</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <h1>Tienda Naturista 🌿</h1>
  <p>Productos naturales para tu bienestar</p>
</header>

<div class="top-bar">
  <input type="text" id="buscador" placeholder="Buscar producto...">

  <div class="filtros">
    <button onclick="filtrar('todos')" class="activo">Todos</button>
    <button onclick="filtrar('te')">Tés</button>
    <button onclick="filtrar('proteina')">Proteínas</button>
  </div>
</div>

<!-- 🛒 BOTÓN FLOTANTE -->
<div class="btn-carrito" onclick="toggleCarrito()">
  🛒 <span id="contador">0</span>
</div>

<!-- 🧲 PANEL LATERAL -->
<div class="carrito-panel" id="carritoPanel">
  <div class="carrito-header">
    <h2>Tu carrito</h2>
    <span onclick="toggleCarrito()">✖</span>
  </div>

  <ul id="lista-carrito"></ul>
  <p id="total">Total: $0</p>

  <label>Método de pago:</label>
  <select id="metodoPago">
    <option value="">Selecciona método</option>
    <option value="Nequi">Nequi</option>
    <option value="Daviplata">Daviplata</option>
    <option value="Tarjeta">Tarjeta</option>
  </select>

  <button onclick="enviarWhatsApp()">Pedir por WhatsApp</button>
</div>

<!-- 🛍️ PRODUCTOS -->
<section class="productos">

  <div class="card te">
    <img src="img/te.jpg">
    <h2>Té Verde</h2>
    <p>Ayuda a la digestión</p>
    <span class="precio">$15000</span>
    <button onclick="agregarCarrito('Té Verde', 15000)">🛒 Agregar</button>
  </div>

  <div class="card proteina">
    <img src="img/proteina.jpg">
    <h2>Proteína Natural</h2>
    <p>Energía y masa muscular</p>
    <span class="precio">$80000</span>
    <button onclick="agregarCarrito('Proteína Natural', 80000)">🛒 Agregar</button>
  </div>

</section>

<!-- 🔔 NOTIFICACIÓN -->
<div id="notificacion" class="notificacion"></div>

<script src="script.js"></script>

</body>
</html>
